name: Download Persian Subtitle

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  subtitle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract Persian subtitle
        run: |
          python app.py "${{ github.event.inputs.url }}"

      - name: Upload SRT
        uses: actions/upload-artifact@v4
        with:
          name: persian-subtitle
          path: subtitle_fa.srt
